<script>

const dashboardUrls = {

  finger:'/finger-millet.html',
  pearl:'/pearl-millet.html',
  proso:'/proso-millet.html'

};

const dashboardTitles = {

  finger:'🌾 Finger Millet Research Dashboard',
  pearl:'🌿 Pearl Millet Research Dashboard',
  proso:'🌱 Proso Millet Research Dashboard'

};

function openDashboard(key){

  document.getElementById(
    'dashboardOverlay'
  ).style.display='flex';

  document.getElementById(
    'overlayTitle'
  ).textContent = dashboardTitles[key];

  document.getElementById(
    'dashboardFrame'
  ).src = dashboardUrls[key];

  document.body.style.overflow='hidden';

}

function closeDashboard(){

  document.getElementById(
    'dashboardOverlay'
  ).style.display='none';

  document.getElementById(
    'dashboardFrame'
  ).src='';

  document.body.style.overflow='';

}
